name: Build
on:
  push:
    branches:
      - master

jobs:
  # NOTE: This spell checker only checks the changes *in a commit*. It won't
  # scan the whole repo or even a whole file - just what's changed.
  # See https://github.com/TypoCI/spellcheck-action
  # Another option: https://github.com/check-spelling/check-spelling
  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 4
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.ref }}

      - name: TypoCheck
        uses: typoci/spellcheck-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Jekyll Site
    runs-on: ubuntu-latest
    needs: spellcheck

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.ref }}

      - name: Build
        uses: joshbeard/jekyll-build-action@joshbeard
        env:
          GIT_CEILING_DIRECTORIES: $GITHUB_WORKSPACE

      - uses: actions/upload-artifact@master
        with:
          name: src
          path: _site/

  minify:
    name: Minify
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@master
        with:
          name: src

      - name: Install minify
        run: |
          wget https://github.com/tdewolff/minify/releases/download/v2.10.0/minify_linux_amd64.tar.gz
          tar -xzf minify_linux_amd64.tar.gz
          chmod +x minify
          sudo mv minify /usr/local/bin/

      - name: ls
        run: ls -l

      - name: Minify
        run: minify --recursive --output . .

      - name: Upload artifact
        uses: actions/upload-artifact@master
        with:
          name: minify
          path: .

  validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    needs: minify
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@master
        with:
          name: minify
          path: _site

      - name: HTML5Validator
        uses: Cyb3r-Jak3/html5validator-action@v8.0.0
        with:
          root: _site/

  deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@master
        with:
          name: minify
          path: _site

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'us-west-2'

      - name: Deploy artifact to S3
        run: ruby util/deploy-site.rb --site-dir _site
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          CF_DISTRIBUTION: ${{ secrets.CF_DISTRIBUTION }}
          AWS_REGION: 'us-west-2'
          CF_REGION: 'us-east-1'
